name: Cleanup validation diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install cloud dependencies
        working-directory: cloud
        run: npm ci --no-audit --no-fund

      - name: Apply cleanup
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mapfile -t script_files < <(git ls-tree -r --name-only "$BASE_SHA" | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|jsonc)$')
          git checkout "$BASE_SHA" -- "${script_files[@]}"
          python - <<'PY'
          from pathlib import Path
          import os
          import textwrap

          source = Path('.github/workflows/final-document-cleanup.yml').read_text(encoding='utf-8')

          def extract(start: str, end: str, output: Path) -> None:
              body = source.split(start, 1)[1].split(end, 1)[0]
              output.write_text(textwrap.dedent(body).lstrip('\n'), encoding='utf-8')

          temporary = Path(os.environ['RUNNER_TEMP'])
          extract("<<'NODE'", "\n          NODE\n", temporary / 'strip-ts.cjs')
          extract("<<'PY'", "\n          PY\n", temporary / 'strip-other.py')
          PY
          node "$RUNNER_TEMP/strip-ts.cjs"
          python "$RUNNER_TEMP/strip-other.py"
          rm -f .github/workflows/cleanup-validation.yml

      - name: Capture validation
        shell: bash
        run: |
          set +e
          git diff --check > "$RUNNER_TEMP/diff.log" 2>&1
          diff_status=$?
          (cd cloud && npm run check) > "$RUNNER_TEMP/check.log" 2>&1
          check_status=$?
          (cd cloud && npm test) > "$RUNNER_TEMP/test.log" 2>&1
          test_status=$?
          printf 'diff_status=%s\ncheck_status=%s\ntest_status=%s\n' "$diff_status" "$check_status" "$test_status" > "$RUNNER_TEMP/status.txt"
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: cleanup-validation-diagnostics
          path: |
            ${{ runner.temp }}/status.txt
            ${{ runner.temp }}/diff.log
            ${{ runner.temp }}/check.log
            ${{ runner.temp }}/test.log
          if-no-files-found: error
          retention-days: 1
