name: Apply Stationhead Window Fixes

on:
  push:
    branches:
      - agent/fix-stationhead-window-state
    paths:
      - tools/apply_stationhead_window_fixes.py
      - .github/workflows/apply-stationhead-window-fixes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-stationhead-window-state
          fetch-depth: 0
      - name: Apply fixes
        run: python tools/apply_stationhead_window_fixes.py
      - name: Validate diff
        run: |
          git diff --check
          git diff -- native/src/sh.h native/src/sh.cpp native/src/sh_webview.cpp native/src/sh_shared.h native/src/app.cpp
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add native/src/sh.h native/src/sh.cpp native/src/sh_webview.cpp native/src/sh_shared.h native/src/app.cpp
          git commit -m "Fix Stationhead window authentication state"
          git push origin HEAD:agent/fix-stationhead-window-state
