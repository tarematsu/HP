name: Run documentation cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  run-cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install cloud dependencies
        working-directory: cloud
        run: npm ci --no-audit --no-fund

      - name: Extract and run cleanup
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import textwrap

          source = Path('.github/workflows/strip-documentation-comments.yml').read_text(encoding='utf-8')

          def extract(start: str, end: str, output: Path) -> None:
              body = source.split(start, 1)[1].split(end, 1)[0]
              output.write_text(textwrap.dedent(body).lstrip('\n'), encoding='utf-8')

          temporary = Path(os.environ['RUNNER_TEMP'])
          extract("<<'NODE'", "\n          NODE", temporary / 'strip-ts.cjs')
          extract("<<'PY'", "\n          PY", temporary / 'strip-repo.py')
          PY
          node "$RUNNER_TEMP/strip-ts.cjs"
          python "$RUNNER_TEMP/strip-repo.py"
          rm -f .github/workflows/run-strip-on-pr.yml

      - name: Validate changes
        shell: bash
        run: |
          git diff --check
          cd cloud
          npm run check
          npm test

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove documentation and source comments [skip ci]"
          git push
