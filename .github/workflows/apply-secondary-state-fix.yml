name: Apply secondary Stationhead state fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/isolate-stationhead-webview-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply secondary state propagation fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          header_path = Path('native/src/sh.h')
          header = header_path.read_text(encoding='utf-8')
          header = replace_once(
              header,
              '  // WebView2 profile (Secondary uses an isolated named profile) and which\n',
              '  // WebView2 user-data environment and which\n',
              'update role isolation comment')
          header = replace_once(
              header,
              '  bool secondaryAudioMuted = false;\n'
              '  bool primaryAudioSelected = true;\n',
              '  bool secondaryAudioMuted = false;\n'
              '  bool secondaryPlaying = false;\n'
              '  bool primaryAudioSelected = true;\n',
              'add render-only secondary playback state')
          header_path.write_text(header, encoding='utf-8')

          app_path = Path('native/src/app.cpp')
          app = app_path.read_text(encoding='utf-8')
          app = replace_once(
              app,
              '    state.secondaryAudioMuted = secondaryStatus->audioMuted;\n'
              '    state.secondaryUrl = std::move(secondaryStatus->url);\n',
              '    state.secondaryAudioMuted = secondaryStatus->audioMuted;\n'
              '    state.secondaryPlaying = secondaryStatus->playing;\n'
              '    state.secondaryUrl = std::move(secondaryStatus->url);\n',
              'propagate secondary playback into render state')
          app = replace_once(
              app,
              '    state.secondaryAudioMuted = false;\n'
              '    state.secondaryUrl.clear();\n',
              '    state.secondaryAudioMuted = false;\n'
              '    state.secondaryPlaying = false;\n'
              '    state.secondaryUrl.clear();\n',
              'clear absent secondary playback state')
          app_path.write_text(app, encoding='utf-8')

          messages_path = Path('native/src/app_messages.cpp')
          messages = messages_path.read_text(encoding='utf-8')
          messages = replace_once(
              messages,
              '      if (!rendererStarted_ && stateChanged) {\n'
              '        StartDeferredServices(UnixMillis(), renderState_.stationhead);\n'
              '      }\n'
              '      if (layoutChanged || stateChanged) PublishRenderStateNow();\n',
              '      if (!rendererStarted_) {\n'
              '        StartDeferredServices(UnixMillis(), renderState_.stationhead);\n'
              '      } else if (!layoutChanged && stateChanged) {\n'
              '        ApplyStationheadWindowPlacement(renderState_.stationhead, secondaryStatus);\n'
              '      }\n'
              '      if (layoutChanged || stateChanged) PublishRenderStateNow();\n',
              'evaluate startup and placement on secondary-only events')
          messages_path.write_text(messages, encoding='utf-8')

          combined = '\n'.join([
              header_path.read_text(encoding='utf-8'),
              app_path.read_text(encoding='utf-8'),
              messages_path.read_text(encoding='utf-8'),
          ])
          if combined.count('secondaryPlaying') < 3:
              raise SystemExit('secondary playback state is not fully propagated')
          if 'if (!rendererStarted_ && stateChanged)' in combined:
              raise SystemExit('startup remains incorrectly gated by render-state equality')
          PY

          rm .github/workflows/apply-secondary-state-fix.yml
          git diff --check

      - name: Commit secondary state fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/sh.h native/src/app.cpp native/src/app_messages.cpp \
            .github/workflows/apply-secondary-state-fix.yml
          git commit -m "Propagate secondary Stationhead playback state"
          git push origin HEAD:${{ github.head_ref }}
