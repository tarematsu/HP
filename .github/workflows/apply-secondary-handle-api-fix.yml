name: Apply secondary Stationhead handle API fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/isolate-stationhead-webview-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Expose secondary notification operations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('native/src/app.h')
          text = path.read_text(encoding='utf-8')
          old = (
              '  void SetPlaybackFallback(bool active, const std::wstring& reason) {\n'
              '    if (!player_) return;\n'
              '    player_->SetPlaybackFallback(active, reason);\n'
              '    ApplyBounds();\n'
              '  }\n'
              '};\n'
          )
          new = (
              '  void SetPlaybackFallback(bool active, const std::wstring& reason) {\n'
              '    if (!player_) return;\n'
              '    player_->SetPlaybackFallback(active, reason);\n'
              '    ApplyBounds();\n'
              '  }\n'
              '  void ShowAfterAudioStop() {\n'
              '    if (!player_) return;\n'
              '    ApplyInteractiveBounds();\n'
              '    player_->ShowAfterAudioStop();\n'
              '    ApplyBounds();\n'
              '  }\n'
              '  void ReleaseCompletedAuth() {\n'
              '    if (!player_) return;\n'
              '    player_->ReleaseCompletedAuth();\n'
              '    ApplyBounds();\n'
              '  }\n'
              '  uint32_t ConsumeChangeFlags() {\n'
              '    return player_ ? player_->ConsumeChangeFlags() : StationheadChangeNone;\n'
              '  }\n'
              '};\n'
          )
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'secondary handle insertion: expected one match, found {count}')
          text = text.replace(old, new, 1)
          if text.count('uint32_t ConsumeChangeFlags()') != 2:
              raise SystemExit('both Stationhead handles must expose change consumption')
          path.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/apply-secondary-handle-api-fix.yml
          git diff --check

      - name: Commit secondary handle API fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/app.h .github/workflows/apply-secondary-handle-api-fix.yml
          git commit -m "Expose secondary Stationhead notification operations"
          git push origin HEAD:${{ github.head_ref }}
