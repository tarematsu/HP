name: Apply playback panel contract fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/fix-playback-panel-json'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply playback contract patch
        shell: bash
        run: |
          python3 .github/scripts/apply_playback_panel_contract_fix.py
          rm .github/scripts/apply_playback_panel_contract_fix.py
          rm .github/workflows/apply-playback-panel-contract-fix.yml
          git diff --check

      - name: Commit playback panel fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix music panel playback JSON parsing"
          git push origin HEAD:${{ github.head_ref }}
