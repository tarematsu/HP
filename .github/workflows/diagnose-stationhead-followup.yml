name: Diagnose Stationhead follow-up patch

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    if: github.head_ref == 'agent/isolate-stationhead-webview-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Extract and run patch script
        shell: bash
        run: |
          awk '
            /python3 - <<'\''PY'\''/ { capture=1; next }
            capture && /^          PY$/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-stationhead-followup-fixes.yml > /tmp/followup.py
          set +e
          python3 /tmp/followup.py > /tmp/followup.log 2>&1
          echo $? > /tmp/followup.status
          set -e
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stationhead-followup-diagnostics
          path: |
            /tmp/followup.log
            /tmp/followup.status
            /tmp/followup.py
