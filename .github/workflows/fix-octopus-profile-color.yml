name: Fix Octopus profile color math

on:
  push:
    branches:
      - agent/fix-octopus-complete-day-profile
    paths:
      - .github/workflows/fix-octopus-profile-color.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Avoid MSVC constant truncation warning
        shell: python
        run: |
          from pathlib import Path
          path = Path("native/src/renderer_panels.cpp")
          text = path.read_text(encoding="utf-8")
          old = '''      const auto blendOnBackground = [](COLORREF foreground, BYTE alpha) {
        const int inverse = 255 - alpha;
        const int red = (GetRValue(foreground) * alpha + GetRValue(kWidgetBackground) * inverse) / 255;
        const int green = (GetGValue(foreground) * alpha + GetGValue(kWidgetBackground) * inverse) / 255;
        const int blue = (GetBValue(foreground) * alpha + GetBValue(kWidgetBackground) * inverse) / 255;
        return RGB(red, green, blue);
      };'''
          new = '''      const auto blendOnBackground = [](COLORREF foreground, BYTE alpha) {
        const int inverse = 255 - alpha;
        constexpr int backgroundRed = static_cast<int>(kWidgetBackground & 0xffu);
        constexpr int backgroundGreen = static_cast<int>((kWidgetBackground >> 8) & 0xffu);
        constexpr int backgroundBlue = static_cast<int>((kWidgetBackground >> 16) & 0xffu);
        const int red = (GetRValue(foreground) * alpha + backgroundRed * inverse) / 255;
        const int green = (GetGValue(foreground) * alpha + backgroundGreen * inverse) / 255;
        const int blue = (GetBValue(foreground) * alpha + backgroundBlue * inverse) / 255;
        return RGB(red, green, blue);
      };'''
          if text.count(old) != 1:
              raise SystemExit("expected color blending block not found exactly once")
          path.write_text(text.replace(old, new), encoding="utf-8")
      - name: Commit warning fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/renderer_panels.cpp
          git commit -m "Avoid renderer color truncation warning"
          git push origin HEAD:${{ github.ref_name }}
