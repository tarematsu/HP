name: Native Updater Static Analysis

on:
  pull_request:
    paths:
      - "native/**"
      - ".github/workflows/native-updater-analysis.yml"
  workflow_dispatch:

concurrency:
  group: native-updater-analysis-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-shared-stationhead-udf:
    if: github.head_ref == 'agent/share-stationhead-user-data'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply shared UDF patch
        shell: bash
        run: |
          python3 .github/scripts/apply_shared_stationhead_udf.py
          git checkout origin/main -- .github/workflows/native-updater-analysis.yml
          rm -f .github/scripts/apply_shared_stationhead_udf.py
          rm -f .github/workflows/apply-shared-stationhead-udf.yml
          rm -f .github/workflows/run-shared-stationhead-udf.yml
          rm -f .ci-trigger-shared-stationhead-udf
          git diff --check
      - name: Commit source changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Share Stationhead user data across profiles"
          git push origin HEAD:${{ github.head_ref }}

  analyze-updater:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path native/packages | Out-Null
          nuget install Microsoft.Web.WebView2 -Version 1.0.4022.49 -OutputDirectory native/packages -NonInteractive
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure strict static analysis
        shell: pwsh
        env:
          HOMEPANEL_BUILD_VERSION: "2607100000"
        run: |
          New-Item -ItemType Directory -Force native/ci-logs | Out-Null
          cmake -S native -B native/build-updater-analyze `
            -G "Visual Studio 17 2022" -A x64 `
            -DHOMEPANEL_CI_STRICT=ON `
            -DHOMEPANEL_CI_STATIC_ANALYSIS=ON `
            2>&1 | Tee-Object native/ci-logs/updater-analyze-configure.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Analyze HomePanelUpdater
        shell: pwsh
        env:
          HOMEPANEL_BUILD_VERSION: "2607100000"
        run: |
          cmake --build native/build-updater-analyze --config Release --target HomePanelUpdater --parallel 2 `
            2>&1 | Tee-Object native/ci-logs/updater-analyze-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload updater analysis diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: homepanel-updater-analysis-logs
          path: native/ci-logs
          if-no-files-found: warn
          retention-days: 7
