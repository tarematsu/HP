name: Apply Stationhead recovery patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Correct patch helper indentation
        run: |
          python -c 'from pathlib import Path; p=Path(".github/scripts/apply_stationhead_recovery.py"); t=p.read_text(encoding="utf-8"); old="from pathlib import Path\nfrom textwrap import dedent\n\n\ndef block(value: str) -> str:\n    return dedent(value).lstrip(\"\\n\")\n"; new="from pathlib import Path\n\n\ndef block(value: str) -> str:\n    value = value.lstrip(\"\\n\")\n    return \"\".join(line[8:] if line.startswith(\"        \") else line for line in value.splitlines(keepends=True))\n"; assert t.count(old) == 1; p.write_text(t.replace(old, new, 1), encoding="utf-8")'

      - name: Apply focused Stationhead recovery changes
        run: python .github/scripts/apply_stationhead_recovery.py

      - name: Commit patch to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Stationhead 52分更新後の音声復帰を監視"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
