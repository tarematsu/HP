name: Apply Stationhead follow-up fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/isolate-stationhead-webview-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply focused follow-up fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          messages_path = Path('native/src/app_messages.cpp')
          messages = messages_path.read_text(encoding='utf-8')
          old_handler = '''    case WM_HP_STATIONHEAD_CHANGED: {
              const uint32_t changes = stationhead_->ConsumeChangeFlags();
              bool layoutChanged = false;
              if ((changes & StationheadChangeReleaseAuth) != 0) {
                stationhead_->ReleaseCompletedAuth();
              }
              if ((changes & StationheadChangeShowPlayer) != 0) {
                stationhead_->ShowAfterAudioStop();
                if (selectedTab_ != WorkspaceTab::Stationhead) {
                  selectedTab_ = WorkspaceTab::Stationhead;
                  layoutChanged = true;
                }
              } else if ((changes & StationheadChangeReturnMain) != 0 &&
                         selectedTab_ != WorkspaceTab::Main) {
                selectedTab_ = WorkspaceTab::Main;
                layoutChanged = true;
              }
          '''
          new_handler = '''    case WM_HP_STATIONHEAD_CHANGED: {
              const uint32_t primaryChanges = stationhead_->ConsumeChangeFlags();
              const uint32_t secondaryChanges = secondaryStationhead_
                  ? secondaryStationhead_->ConsumeChangeFlags()
                  : 0;
              const uint32_t changes = primaryChanges | secondaryChanges;
              bool layoutChanged = false;
              if ((primaryChanges & StationheadChangeReleaseAuth) != 0) {
                stationhead_->ReleaseCompletedAuth();
              }
              if (secondaryStationhead_ &&
                  (secondaryChanges & StationheadChangeReleaseAuth) != 0) {
                secondaryStationhead_->ReleaseCompletedAuth();
              }
              bool showPlayer = false;
              if ((primaryChanges & StationheadChangeShowPlayer) != 0) {
                stationhead_->ShowAfterAudioStop();
                showPlayer = true;
              }
              if (secondaryStationhead_ &&
                  (secondaryChanges & StationheadChangeShowPlayer) != 0) {
                secondaryStationhead_->ShowAfterAudioStop();
                showPlayer = true;
              }
              if (showPlayer) {
                if (selectedTab_ != WorkspaceTab::Stationhead) {
                  selectedTab_ = WorkspaceTab::Stationhead;
                  layoutChanged = true;
                }
              } else if ((changes & StationheadChangeReturnMain) != 0 &&
                         selectedTab_ != WorkspaceTab::Main) {
                selectedTab_ = WorkspaceTab::Main;
                layoutChanged = true;
              }
          '''
          messages = replace_once(
              messages, old_handler, new_handler,
              'consume role-specific Stationhead notifications')
          messages_path.write_text(messages, encoding='utf-8')

          sh_path = Path('native/src/sh.cpp')
          sh = sh_path.read_text(encoding='utf-8')
          old_controller = '''        HRESULT started = E_FAIL;
                  if (!IsSecondary()) {
                    started = environment_->CreateCoreWebView2Controller(hostWindow_, onController.Get());
                  } else {
                    ComPtr<ICoreWebView2Environment10> environment10;
                    if (FAILED(environment_.As(&environment10)) || !environment10) {
                      creating_ = false;
                      ScheduleRecreate(L"WebView2 multi-profile API unavailable", 30'000);
                      return;
                    }
                    ComPtr<ICoreWebView2ControllerOptions> options;
                    const HRESULT optionsResult =
                        environment10->CreateCoreWebView2ControllerOptions(options.GetAddressOf());
                    if (FAILED(optionsResult) || !options) {
                      creating_ = false;
                      ScheduleRecreate(L"profile options creation failed " + HResultHex(optionsResult));
                      return;
                    }
                    options->put_ProfileName(L"stationhead-secondary");
                    options->put_IsInPrivateModeEnabled(FALSE);
                    started = environment10->CreateCoreWebView2ControllerWithOptions(
                        hostWindow_, options.Get(), onController.Get());
                  }
          '''
          new_controller = '''        const HRESULT started =
                      environment_->CreateCoreWebView2Controller(hostWindow_, onController.Get());
          '''
          sh = replace_once(
              sh, old_controller, new_controller,
              'use the default controller in each isolated environment')

          old_auth = '''  if (!IsSecondary()) {
              environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());
              return;
            }
            ComPtr<ICoreWebView2Environment10> environment10;
            if (FAILED(environment_.As(&environment10)) || !environment10) return;
            ComPtr<ICoreWebView2ControllerOptions> options;
            if (FAILED(environment10->CreateCoreWebView2ControllerOptions(options.GetAddressOf())) || !options) return;
            options->put_ProfileName(L"stationhead-secondary");
            options->put_IsInPrivateModeEnabled(FALSE);
            environment10->CreateCoreWebView2ControllerWithOptions(authHostWindow_, options.Get(), onController.Get());
          '''
          new_auth = '''  environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());
          '''
          sh = replace_once(
              sh, old_auth, new_auth,
              'use the isolated environment for auth controller creation')
          sh_path.write_text(sh, encoding='utf-8')

          webview_path = Path('native/src/sh_webview.cpp')
          webview = webview_path.read_text(encoding='utf-8')
          old_popup = '''            HRESULT createResult = E_FAIL;
                      if (!IsSecondary()) {
                        createResult = environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());
                      } else {
                        ComPtr<ICoreWebView2Environment10> environment10;
                        if (FAILED(environment_.As(&environment10)) || !environment10) {
                          FinishSpotifyAuthorization(L"WebView2 multi-profile API unavailable");
                          deferral->Complete();
                          return S_OK;
                        }
                        ComPtr<ICoreWebView2ControllerOptions> options;
                        if (FAILED(environment10->CreateCoreWebView2ControllerOptions(options.GetAddressOf())) || !options) {
                          FinishSpotifyAuthorization(L"Spotify popup profile options creation failed");
                          deferral->Complete();
                          return S_OK;
                        }
                        options->put_ProfileName(L"stationhead-secondary");
                        options->put_IsInPrivateModeEnabled(FALSE);
                        createResult = environment10->CreateCoreWebView2ControllerWithOptions(
                            authHostWindow_, options.Get(), onController.Get());
                      }
          '''
          new_popup = '''            const HRESULT createResult =
                          environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());
          '''
          webview = replace_once(
              webview, old_popup, new_popup,
              'use the isolated environment for popup controller creation')
          webview = replace_once(
              webview,
              '    status_.detail = IsSecondary() ? L"creating isolated WebView2 profile" : L"起動中";\n',
              '    status_.detail = IsSecondary() ? L"creating isolated WebView2 environment" : L"起動中";\n',
              'update secondary creation status')
          webview_path.write_text(webview, encoding='utf-8')

          audio_path = Path('native/src/sh_audio.cpp')
          audio = audio_path.read_text(encoding='utf-8')
          audio = replace_once(
              audio,
              '''// Window B's isolated WebView2 profile still ships the platform's default
          // user agent, which is otherwise identical to Window A's. Tag it distinctly
          ''',
              '''// Window B's isolated WebView2 environment still ships the platform's default
          // user agent, which is otherwise identical to Window A's. Tag it distinctly
          ''',
              'update isolated environment comment')
          audio_path.write_text(audio, encoding='utf-8')

          combined = '\n'.join([
              messages_path.read_text(encoding='utf-8'),
              sh_path.read_text(encoding='utf-8'),
              webview_path.read_text(encoding='utf-8'),
          ])
          if 'stationhead-secondary' in combined:
              raise SystemExit('legacy secondary profile name remains')
          if 'ICoreWebView2Environment10' in combined:
              raise SystemExit('legacy multi-profile API dependency remains')
          if 'secondaryStationhead_->ConsumeChangeFlags()' not in combined:
              raise SystemExit('secondary change notification latch is not consumed')
          PY

          rm .github/workflows/apply-stationhead-followup-fixes.yml
          git diff --check

      - name: Commit follow-up fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/app_messages.cpp native/src/sh.cpp \
            native/src/sh_webview.cpp native/src/sh_audio.cpp \
            .github/workflows/apply-stationhead-followup-fixes.yml
          git commit -m "Fix secondary Stationhead notifications and recreation"
          git push origin HEAD:${{ github.head_ref }}
