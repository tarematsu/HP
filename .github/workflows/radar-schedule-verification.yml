name: Temporary radar schedule verification

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/radar-schedule-verification.yml"

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: homepanel-updates
      EXPECTED_MAIN_SHA: 11ac1f9efadac489ad4bffec4cf850600e3155c8

    steps:
      - name: Wait for real schedule run
        id: schedule
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/$GITHUB_REPOSITORY"
          headers=(
            -H "Authorization: Bearer $GH_TOKEN"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          mkdir -p report
          found_id=""
          for attempt in $(seq 1 80); do
            curl --fail-with-body --silent --show-error "${headers[@]}" \
              "$api/actions/workflows/radar-frames.yml/runs?event=schedule&per_page=20" \
              > report/schedule-runs.json
            found_id="$(jq -r --arg sha "$EXPECTED_MAIN_SHA" '.workflow_runs | map(select(.head_sha == $sha)) | .[0].id // empty' report/schedule-runs.json)"
            if [[ -n "$found_id" ]]; then
              echo "Found schedule run $found_id on attempt $attempt"
              break
            fi
            echo "No schedule run for $EXPECTED_MAIN_SHA yet, attempt $attempt/80"
            sleep 10
          done
          test -n "$found_id" || { echo "No schedule run appeared within the verification window" >&2; exit 1; }
          echo "run_id=$found_id" >> "$GITHUB_OUTPUT"

      - name: Wait for schedule run success
        env:
          SCHEDULE_RUN_ID: ${{ steps.schedule.outputs.run_id }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/$GITHUB_REPOSITORY"
          headers=(
            -H "Authorization: Bearer $GH_TOKEN"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          for attempt in $(seq 1 100); do
            curl --fail-with-body --silent --show-error "${headers[@]}" \
              "$api/actions/runs/$SCHEDULE_RUN_ID" > report/schedule-run.json
            status="$(jq -r '.status' report/schedule-run.json)"
            conclusion="$(jq -r '.conclusion // empty' report/schedule-run.json)"
            echo "schedule run status=$status conclusion=${conclusion:-pending} attempt=$attempt/100"
            if [[ "$status" == completed ]]; then
              test "$conclusion" = success || { jq . report/schedule-run.json; exit 1; }
              exit 0
            fi
            sleep 5
          done
          echo "Schedule run did not complete within the verification window" >&2
          exit 1

      - name: Resolve R2 endpoint
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          verify="$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)"
          token_id="$(jq -er '.result.id' <<<"$verify")"
          secret="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          accounts="$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            'https://api.cloudflare.com/client/v4/accounts?per_page=50')"
          export AWS_ACCESS_KEY_ID="$token_id" AWS_SECRET_ACCESS_KEY="$secret"
          match=""
          while read -r account_id; do
            endpoint="https://${account_id}.r2.cloudflarestorage.com"
            if aws s3api head-bucket --endpoint-url "$endpoint" --bucket "$R2_BUCKET" >/dev/null 2>&1; then
              test -z "$match" || { echo 'Multiple matching accounts' >&2; exit 1; }
              match="$account_id"
            fi
          done < <(jq -r '.result[].id' <<<"$accounts")
          test -n "$match"
          echo "::add-mask::$token_id"
          echo "::add-mask::$secret"
          echo "AWS_ACCESS_KEY_ID=$token_id" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$secret" >> "$GITHUB_ENV"
          echo "R2_ENDPOINT=https://${match}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Verify R2 freshness after schedule run
        env:
          SCHEDULE_RUN_ID: ${{ steps.schedule.outputs.run_id }}
        run: |
          set -euo pipefail
          aws s3api get-object \
            --endpoint-url "$R2_ENDPOINT" \
            --bucket "$R2_BUCKET" \
            --key radar/manifest.json \
            report/manifest.json >/dev/null
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import pathlib

          run = json.loads(pathlib.Path('report/schedule-run.json').read_text(encoding='utf-8'))
          manifest = json.loads(pathlib.Path('report/manifest.json').read_text(encoding='utf-8'))
          generated = dt.datetime.fromisoformat(manifest['generatedAt'].replace('Z', '+00:00'))
          started = dt.datetime.fromisoformat(run['run_started_at'].replace('Z', '+00:00'))
          now = dt.datetime.now(dt.timezone.utc)
          frames = manifest.get('frames') or []
          if run.get('event') != 'schedule':
              raise SystemExit(f"unexpected event: {run.get('event')}")
          if run.get('head_sha') != os.environ['EXPECTED_MAIN_SHA']:
              raise SystemExit(f"unexpected head SHA: {run.get('head_sha')}")
          if manifest.get('renderVersion') != 'gha-v3' or manifest.get('precomposed') is not True:
              raise SystemExit('unexpected manifest contract')
          if len(frames) != 13:
              raise SystemExit(f"unexpected frame count: {len(frames)}")
          if generated < started - dt.timedelta(seconds=30):
              raise SystemExit(f"manifest was not updated by schedule run: generated={generated} started={started}")
          if now - generated > dt.timedelta(minutes=10):
              raise SystemExit(f"manifest is stale after schedule run: {now - generated}")
          summary = {
              'scheduleRunId': run.get('id'),
              'event': run.get('event'),
              'headSha': run.get('head_sha'),
              'createdAt': run.get('created_at'),
              'runStartedAt': run.get('run_started_at'),
              'updatedAt': run.get('updated_at'),
              'conclusion': run.get('conclusion'),
              'manifestGeneratedAt': manifest.get('generatedAt'),
              'manifestCurrentAt': manifest.get('currentAt'),
              'frameCount': len(frames),
              'renderVersion': manifest.get('renderVersion'),
              'precomposed': manifest.get('precomposed'),
          }
          pathlib.Path('report/verification-summary.json').write_text(
              json.dumps(summary, separators=(',', ':')) + '\n', encoding='utf-8'
          )
          print(json.dumps(summary, separators=(',', ':')))
          PY

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-schedule-verification-${{ github.run_id }}
          path: report/
          if-no-files-found: warn
          retention-days: 1
