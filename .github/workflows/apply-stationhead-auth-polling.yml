name: Apply Stationhead authenticated API polling change

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply focused source changes
        shell: python
        run: |
          from pathlib import Path

          primary = Path("native/src/sh.cpp")
          text = primary.read_text(encoding="utf-8")
          old = "constexpr int64_t kDailyPlayStatsIntervalMs = 5 * 60'000;"
          new = "constexpr int64_t kDailyPlayStatsIntervalMs = 10 * 60'000;"
          if text.count(old) != 1:
              raise SystemExit(f"expected one primary polling interval, found {text.count(old)}")
          primary.write_text(text.replace(old, new, 1), encoding="utf-8")

          secondary = Path("native/src/secondary_sh.cpp")
          text = secondary.read_text(encoding="utf-8")
          probe_tick = '''  if (authProbeInFlight_ && nowMs - authProbeStartedAt_ >= kAuthProbeTimeoutMs) {
            authProbeInFlight_ = false;
            authProbeStartedAt_ = 0;
            log_.Warn(L"Secondary Stationhead auth probe timed out");
          }
          if (lastAuthProbeAt_ > 0 && nowMs - lastAuthProbeAt_ >= kAuthProbeIntervalMs) {
            PollAuthProbe(nowMs);
          }
'''
          probe_deadlines = '''  if (authProbeInFlight_) consider(authProbeStartedAt_ + kAuthProbeTimeoutMs);
          if (lastAuthProbeAt_ > 0 && !authProbeInFlight_) consider(lastAuthProbeAt_ + kAuthProbeIntervalMs);
'''
          if text.count(probe_tick) != 1:
              raise SystemExit(f"expected one secondary probe tick block, found {text.count(probe_tick)}")
          if text.count(probe_deadlines) != 1:
              raise SystemExit(f"expected one secondary probe deadline block, found {text.count(probe_deadlines)}")
          text = text.replace(probe_tick, "", 1).replace(probe_deadlines, "", 1)
          secondary.write_text(text, encoding="utf-8")

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          rm .github/workflows/apply-stationhead-auth-polling.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/sh.cpp native/src/secondary_sh.cpp .github/workflows/apply-stationhead-auth-polling.yml
          git commit -m "Adjust Stationhead authenticated API polling"
          git push origin HEAD:main
