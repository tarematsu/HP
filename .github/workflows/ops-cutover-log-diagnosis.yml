name: Ops cutover log diagnosis

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-cutover-log-diagnosis.yml

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Extract failed cutover log
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '88606814300'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/jobs/$JOB_ID/logs" \
            -o job.log
          {
            echo '=== matched failure lines ==='
            grep -nEi 'error|failed|failure|sqlite|mismatch|refusing|unexpected|constraint|no such|not found' job.log | tail -n 120 || true
            echo
            echo '=== final 220 lines ==='
            tail -n 220 job.log
          } > diagnosis.txt
          cat diagnosis.txt

      - uses: actions/upload-artifact@v4
        with:
          name: cutover-log-diagnosis
          path: diagnosis.txt
          retention-days: 7
