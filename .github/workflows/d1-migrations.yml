name: Apply D1 migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cloud/migrations/**"
      - "cloud/scripts/deploy-existing.mjs"
      - "cloud/wrangler.jsonc"
      - ".github/workflows/d1-migrations.yml"

permissions:
  contents: read

concurrency:
  group: d1-migrations-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloud
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      HOMEPANEL_D1_DATABASE_ID: ${{ secrets.HOMEPANEL_D1_DATABASE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Resolve Cloudflare settings
        id: resolve
        run: node .github/scripts/resolve-cloudflare-config.mjs
        working-directory: ${{ github.workspace }}

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN is not configured"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "CLOUDFLARE_ACCOUNT_ID is not configured"; exit 1; }

      - name: Show pending migrations
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: npx wrangler d1 migrations list "${{ steps.resolve.outputs.database_name }}" --remote --config wrangler.jsonc

      - name: Apply pending migrations
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: npm run migrate:remote

      - name: Verify applied migrations
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          npx wrangler d1 migrations list "${{ steps.resolve.outputs.database_name }}" --remote --config wrangler.jsonc
          npx wrangler d1 execute "${{ steps.resolve.outputs.database_name }}" --remote --config wrangler.jsonc --command "SELECT key, value FROM schema_meta WHERE key = 'schema_version';"
