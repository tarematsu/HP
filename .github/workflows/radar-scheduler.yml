name: Schedule radar frames
run-name: Radar schedule · ${{ github.event_name }} · ${{ github.event.schedule || github.sha }}

on:
  schedule:
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/radar-frames.yml
    secrets: inherit
