name: Temporary radar publisher audit

on:
  pull_request:
    branches: [main]
    paths:
      - "cloud/**"
      - ".github/workflows/fetch-cloudflare-observability.yml"

permissions:
  contents: read

concurrency:
  group: radar-publisher-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_BUILDS_ACCOUNT_ID }}
      RADAR_CENTER_LAT: ${{ vars.RADAR_CENTER_LAT || '35.8923181' }}
      RADAR_CENTER_LON: ${{ vars.RADAR_CENTER_LON || '139.4858691' }}
      RADAR_ZOOM: ${{ vars.RADAR_ZOOM || '10' }}
      RADAR_WORK_DIR: ${{ runner.temp }}/homepanel-radar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check "Pillow==11.3.0"
          npm ci --no-audit --no-fund
        working-directory: cloud

      - name: Resolve Cloudflare settings
        id: resolve
        run: node .github/scripts/resolve-cloudflare-config.mjs

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Cloudflare API token is not configured"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Cloudflare account ID is not configured"; exit 1; }

      - name: Download existing radar manifest
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          set -euo pipefail
          mkdir -p "$RADAR_WORK_DIR"
          npx wrangler r2 object get \
            "homepanel-updates/radar/manifest.json" \
            --file="$RADAR_WORK_DIR/existing-manifest.json" \
            --remote \
            || rm -f "$RADAR_WORK_DIR/existing-manifest.json"
        working-directory: cloud

      - name: Build radar WebP frames
        run: |
          set -euo pipefail
          time python .github/scripts/build-radar-frames.py \
            --output-dir "$RADAR_WORK_DIR" \
            --existing-manifest "$RADAR_WORK_DIR/existing-manifest.json" \
            --center-lat "$RADAR_CENTER_LAT" \
            --center-lon "$RADAR_CENTER_LON" \
            --zoom "$RADAR_ZOOM"
          ls -lh "$RADAR_WORK_DIR" "$RADAR_WORK_DIR/frames" || true

      - name: Publish radar frames to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          set -euo pipefail
          count=0
          while IFS=$'\t' read -r file key; do
            test -n "$key" || continue
            count=$((count + 1))
            echo "Uploading frame $count: $key"
            npx wrangler r2 object put "homepanel-updates/$key" \
              --file="$file" \
              --content-type="image/webp" \
              --cache-control="private, max-age=10800, immutable" \
              --remote \
              --force
          done < "$RADAR_WORK_DIR/uploads.tsv"
          echo "Uploaded $count frame objects"

          npx wrangler r2 object put "homepanel-updates/radar/manifest.json" \
            --file="$RADAR_WORK_DIR/manifest.json" \
            --content-type="application/json" \
            --cache-control="private, max-age=0, must-revalidate" \
            --remote \
            --force

      - name: Verify published manifest
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.resolve.outputs.account_id }}
        run: |
          set -euo pipefail
          npx wrangler r2 object get \
            "homepanel-updates/radar/manifest.json" \
            --file="$RADAR_WORK_DIR/verified-manifest.json" \
            --remote
          python - <<'PY'
          import json, os, pathlib
          path = pathlib.Path(os.environ['RADAR_WORK_DIR']) / 'verified-manifest.json'
          value = json.loads(path.read_text(encoding='utf-8'))
          print(json.dumps({
              'version': value.get('version'),
              'generatedAt': value.get('generatedAt'),
              'currentAt': value.get('currentAt'),
              'frames': len(value.get('frames') or []),
          }, separators=(',', ':')))
          if value.get('version') != 2 or len(value.get('frames') or []) != 13:
              raise SystemExit('published radar manifest is invalid')
          PY

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-publisher-audit-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/homepanel-radar/manifest.json
            ${{ runner.temp }}/homepanel-radar/verified-manifest.json
            ${{ runner.temp }}/homepanel-radar/uploads.tsv
          if-no-files-found: warn
          retention-days: 1
