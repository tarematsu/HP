name: Temporary radar R2 audit

on:
  pull_request:
    branches: [main]
    paths:
      - "cloud/**"
      - ".github/workflows/fetch-cloudflare-observability.yml"

permissions:
  contents: read

concurrency:
  group: radar-r2-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: homepanel-updates

    steps:
      - name: Derive R2 credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          verify="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)"
          token_id="$(jq -er '.result.id' <<<"$verify")"
          secret="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          accounts="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 'https://api.cloudflare.com/client/v4/accounts?per_page=50')"
          export AWS_ACCESS_KEY_ID="$token_id" AWS_SECRET_ACCESS_KEY="$secret"
          match=""
          while read -r account_id; do
            endpoint="https://${account_id}.r2.cloudflarestorage.com"
            if aws s3api head-bucket --endpoint-url "$endpoint" --bucket "$R2_BUCKET" >/dev/null 2>&1; then
              test -z "$match" || { echo 'Multiple matching accounts' >&2; exit 1; }
              match="$account_id"
            fi
          done < <(jq -r '.result[].id' <<<"$accounts")
          test -n "$match" || { echo "R2 bucket not accessible: $R2_BUCKET" >&2; exit 1; }
          echo "::add-mask::$token_id"
          echo "::add-mask::$secret"
          echo "AWS_ACCESS_KEY_ID=$token_id" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$secret" >> "$GITHUB_ENV"
          echo "R2_ENDPOINT=https://${match}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Download radar manifest
        shell: bash
        run: |
          set -euo pipefail
          aws s3api get-object \
            --endpoint-url "$R2_ENDPOINT" \
            --bucket "$R2_BUCKET" \
            --key radar/manifest.json \
            manifest.json >/dev/null

      - name: Validate manifest and frame objects
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import pathlib
          import subprocess

          manifest = json.loads(pathlib.Path('manifest.json').read_text(encoding='utf-8'))
          now = dt.datetime.now(dt.timezone.utc)

          def instant(name):
              value = manifest.get(name)
              if not isinstance(value, str):
                  raise SystemExit(f'{name} is missing')
              parsed = dt.datetime.fromisoformat(value.replace('Z', '+00:00'))
              return parsed if parsed.tzinfo else parsed.replace(tzinfo=dt.timezone.utc)

          generated = instant('generatedAt')
          current_ms = manifest.get('currentAt')
          if not isinstance(current_ms, int) or isinstance(current_ms, bool):
              raise SystemExit('currentAt is missing')
          current = dt.datetime.fromtimestamp(current_ms / 1000, tz=dt.timezone.utc)
          frames = manifest.get('frames')
          if manifest.get('version') != 2:
              raise SystemExit(f"unexpected manifest version: {manifest.get('version')!r}")
          if not isinstance(frames, list) or len(frames) != 13:
              raise SystemExit(f'unexpected frame count: {len(frames) if isinstance(frames, list) else None}')
          if now - generated > dt.timedelta(minutes=20):
              raise SystemExit(f'manifest is stale: generatedAt={generated.isoformat()}')
          if now - current > dt.timedelta(minutes=20) or current - now > dt.timedelta(minutes=5):
              raise SystemExit(f'current radar cycle is stale or future: currentAt={current.isoformat()}')

          expected = [current_ms + index * 5 * 60 * 1000 for index in range(13)]
          actual = [frame.get('validAt') if isinstance(frame, dict) else None for frame in frames]
          if actual != expected:
              raise SystemExit(f'unexpected validAt sequence: {actual}')

          objects = []
          for frame in frames:
              key = frame.get('key')
              if not isinstance(key, str) or not key.startswith('radar/frames/') or not key.endswith('.webp'):
                  raise SystemExit(f'invalid frame key: {key!r}')
              result = subprocess.run([
                  'aws', 's3api', 'head-object',
                  '--endpoint-url', os.environ['R2_ENDPOINT'],
                  '--bucket', os.environ['R2_BUCKET'],
                  '--key', key,
                  '--output', 'json',
              ], check=True, capture_output=True, text=True)
              head = json.loads(result.stdout)
              size = int(head.get('ContentLength', 0))
              if size <= 0:
                  raise SystemExit(f'empty frame object: {key}')
              objects.append({
                  'key': key,
                  'size': size,
                  'contentType': head.get('ContentType'),
                  'lastModified': head.get('LastModified'),
              })

          report = {
              'ok': True,
              'checkedAt': now.isoformat().replace('+00:00', 'Z'),
              'generatedAt': generated.isoformat().replace('+00:00', 'Z'),
              'currentAt': current.isoformat().replace('+00:00', 'Z'),
              'frameCount': len(frames),
              'firstValidAt': frames[0]['validAt'],
              'lastValidAt': frames[-1]['validAt'],
              'totalBytes': sum(item['size'] for item in objects),
              'objects': objects,
          }
          pathlib.Path('radar-r2-audit.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(report, ensure_ascii=False, separators=(',', ':')))
          PY

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radar-r2-audit-${{ github.run_id }}
          path: |
            manifest.json
            radar-r2-audit.json
          if-no-files-found: warn
          retention-days: 1
