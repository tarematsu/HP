name: Check Cloudflare observability logs

on:
  pull_request:
    branches: [main]
    paths:
      - "cloud/**"
      - ".github/workflows/fetch-cloudflare-observability.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-observability-hp-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      AWS_DEFAULT_REGION: auto
      R2_BUCKET: cloudflare-managed-1609110a

    steps:
      - name: Derive R2 credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          verify="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" https://api.cloudflare.com/client/v4/user/tokens/verify)"
          token_id="$(jq -er '.result.id' <<<"$verify")"
          secret="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d' ' -f1)"
          accounts="$(curl --fail-with-body --silent --show-error -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 'https://api.cloudflare.com/client/v4/accounts?per_page=50')"
          export AWS_ACCESS_KEY_ID="$token_id" AWS_SECRET_ACCESS_KEY="$secret"
          match=""
          while read -r account_id; do
            endpoint="https://${account_id}.r2.cloudflarestorage.com"
            if aws s3api head-bucket --endpoint-url "$endpoint" --bucket "$R2_BUCKET" >/dev/null 2>&1; then
              test -z "$match" || { echo 'Multiple matching accounts' >&2; exit 1; }
              match="$account_id"
            fi
          done < <(jq -r '.result[].id' <<<"$accounts")
          test -n "$match" || { echo "R2 bucket not accessible: $R2_BUCKET" >&2; exit 1; }
          echo "::add-mask::$token_id"
          echo "::add-mask::$secret"
          echo "AWS_ACCESS_KEY_ID=$token_id" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$secret" >> "$GITHUB_ENV"
          echo "R2_ENDPOINT=https://${match}.r2.cloudflarestorage.com" >> "$GITHUB_ENV"

      - name: Download and filter newest date-folder logs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raw observability-logs
          aws s3api list-objects-v2 --endpoint-url "$R2_ENDPOINT" --bucket "$R2_BUCKET" --output json > objects.json
          jq -r '(.Contents // []) | sort_by(.LastModified) | reverse | .[:100] | .[].Key' objects.json > keys.txt
          test -s keys.txt || { echo 'No observability objects found' >&2; exit 1; }
          while IFS= read -r key; do
            file="raw/$(basename "$key")"
            aws s3api get-object --endpoint-url "$R2_ENDPOINT" --bucket "$R2_BUCKET" --key "$key" "$file" >/dev/null
          done < keys.txt
          python3 - <<'PY'
          import gzip, json, pathlib
          output = pathlib.Path('observability-logs/homepanel-cloud.ndjson')
          count = 0
          with output.open('w', encoding='utf-8') as dst:
              for path in pathlib.Path('raw').iterdir():
                  data = path.read_bytes()
                  if data[:2] == b'\x1f\x8b':
                      data = gzip.decompress(data)
                  for line in data.decode('utf-8', errors='replace').splitlines():
                      try:
                          event = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      if event.get('ScriptName') == 'homepanel-cloud':
                          dst.write(json.dumps(event, ensure_ascii=False, separators=(',', ':')) + '\n')
                          count += 1
          if count == 0:
              raise SystemExit('No homepanel-cloud trace events found in newest R2 objects')
          print(f'Filtered {count} HomePanel events')
          PY

      - name: Upload filtered logs
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-observability-hp-${{ github.run_id }}
          path: observability-logs/
          if-no-files-found: error
          retention-days: 7
