name: Cloudflare Observability

on:
  workflow_run:
    workflows: ["Deploy unified homepanel-cloud Worker"]
    types: [completed]
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: Minutes of Cloudflare metrics and persisted errors to inspect
        required: false
        default: "60"
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-observability-hp-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  observability:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKERS: homepanel-cloud
      LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '60' }}
      CPU_BUDGET_MS: "10"
      DURABLE_OBJECT_CPU_BUDGET_MS: "30000"

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Start post-deployment audit window
        shell: bash
        run: echo "AUDIT_FROM=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Capture live HomePanel events
        continue-on-error: true
        env:
          LIVE_TAIL_WORKER: homepanel-cloud
          LIVE_TAIL_SECONDS: "180"
          LIVE_TAIL_PROBES: /v1/health,/
        shell: bash
        run: node .github/scripts/capture-cloudflare-live-tail.mjs 2>&1 | tee live-tail.log

      - name: Query Cloudflare metrics and persisted errors
        shell: bash
        run: |
          actual_summary="$GITHUB_STEP_SUMMARY"
          GITHUB_STEP_SUMMARY=observability-summary.md python3 .github/scripts/query-cloudflare-observability.py
          cat observability-summary.md >> "$actual_summary"

      - name: Enforce deployed Worker CPU and error policy
        env:
          LIVE_TAIL_LOG: live-tail.log
        shell: bash
        run: python3 .github/scripts/audit-cloudflare-telemetry.py 2>&1 | tee telemetry-audit.log

      - name: Upload sanitized observability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-observability-report-hp-${{ github.run_id }}
          path: |
            observability-summary.md
            telemetry-audit.log
            live-tail.log
          if-no-files-found: warn
          retention-days: 1
