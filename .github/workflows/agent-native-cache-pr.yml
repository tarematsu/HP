name: Fix native cache patch regressions

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/fix-native-cache.py"
      - ".github/workflows/agent-native-cache-pr.yml"

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply and validate fixes
        shell: bash
        run: |
          python3 .github/scripts/fix-native-cache.py
          git diff --check

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/scripts/fix-native-cache.py \
            .github/workflows/agent-native-cache-pr.yml
          git add native/src/renderer_panels/part2.inc native/src/renderer_radar_ui.cpp
          git commit -m "Fix native cache implementation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
