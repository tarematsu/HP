name: Run native cache patch from pull request

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/apply-native-cache.py"
      - ".github/workflows/agent-native-cache-pr.yml"

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply and validate patch
        shell: bash
        run: |
          python3 .github/scripts/apply-native-cache.py
          git diff --check

      - name: Commit native cache patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/scripts/apply-native-cache.py \
            .github/workflows/agent-native-cache-apply.yml \
            .github/workflows/agent-native-cache-pr.yml \
            .github/agent-native-cache-error.txt
          git add native/src/web_renderer.h native/src/dashboard_data.h native/src/dashboard_data.cpp \
            native/src/renderer_state.cpp native/src/renderer_panels/part2.inc \
            native/src/renderer_panels/part3.inc native/src/renderer_radar_ui.cpp
          git commit -m "Cache native dashboard rendering"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
