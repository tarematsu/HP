name: SH refactor source scan

on:
  push:
    branches:
      - automation/sh-refactor-scan
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_BUILDS_ACCOUNT_ID }}
      TARGET_SHA: 032bc9ea135963d579a407d3cd48d70f77398e7f
      WORKER_NAME: stationhead-monitor-collector
    steps:
      - uses: actions/checkout@v4
      - name: Collect Stationhead identifier inventory
        run: node .github/scripts/collect-sh-inventory.mjs
      - name: Upload inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sh-refactor-stationhead-inventory
          path: out
          if-no-files-found: error
          retention-days: 3
