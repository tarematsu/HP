name: Apply SH refactor

on:
  push:
    branches:
      - automation/sh-refactor-scan
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/sh-refactor-scan
          fetch-depth: 0
      - name: Apply file and identifier renames
        run: python .github/scripts/apply-sh-refactor.py
      - name: Commit refactor
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .github/workflows/native-windows-build.yml .github/workflows/sh-refactor-scan.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Rename internal Stationhead files and identifiers to SH"
          git push origin HEAD:automation/sh-refactor-scan
