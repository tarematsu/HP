name: Push non-workflow cleanup

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install cloud dependencies
        working-directory: cloud
        run: npm ci --no-audit --no-fund

      - name: Apply corrected cleanup
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mapfile -t script_files < <(git ls-tree -r --name-only "$BASE_SHA" | grep -E '\.(ts|tsx|js|jsx|mjs|cjs|jsonc)$')
          git checkout "$BASE_SHA" -- "${script_files[@]}"

          python - <<'PY'
          from pathlib import Path
          import os
          import textwrap

          source = Path('.github/workflows/final-document-cleanup.yml').read_text(encoding='utf-8')

          def extract(start: str, end: str, output: Path) -> None:
              body = source.split(start, 1)[1].split(end, 1)[0]
              output.write_text(textwrap.dedent(body).lstrip('\n'), encoding='utf-8')

          temporary = Path(os.environ['RUNNER_TEMP'])
          extract("<<'NODE'", "\n          NODE\n", temporary / 'strip-ts.cjs')
          extract("<<'PY'", "\n          PY\n", temporary / 'strip-other.py')
          PY

          node "$RUNNER_TEMP/strip-ts.cjs"
          python "$RUNNER_TEMP/strip-other.py"
          git show "$BASE_SHA:cloud/test/env.d.ts" > cloud/test/env.d.ts

      - name: Validate full cleanup
        shell: bash
        run: |
          git diff --check
          cd cloud
          npm run check
          npm test

      - name: Restore workflow files for connector handling
        shell: bash
        run: git checkout HEAD -- .github/workflows

      - name: Commit and push ordinary files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Remove documentation and source comments"
          git push origin HEAD:agent/remove-documentation-comments
