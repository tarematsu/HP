name: Ops diagnose video import failure

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-diagnose-video-import.yml

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Extract failed cutover log
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '88615723492'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/jobs/$JOB_ID/logs" \
            -o job.log
          {
            echo '=== matched import failure lines ==='
            grep -nEi 'error|failed|failure|sqlite|constraint|mismatch|refusing|unexpected|no such|too large|limit|import|export|network_events|orientations|row-count|foreign-key' job.log | tail -n 260 || true
            echo
            echo '=== final 420 lines ==='
            tail -n 420 job.log
          } > diagnosis.txt
          cat diagnosis.txt

      - uses: actions/upload-artifact@v4
        with:
          name: video-import-diagnosis
          path: diagnosis.txt
          retention-days: 7
