name: Run VP workspace migration

on:
  issues:
    types:
      - opened
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: run-vp-workspace-migration
  cancel-in-progress: false

jobs:
  migrate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.title == '[automation] Run VP migration'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Report start
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'VP migration started.'
            });

      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/integrate-vp-video
          fetch-depth: 0

      - name: Import current VP snapshot
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/vp video
          git clone --depth 1 https://github.com/tarematsu/VP.git /tmp/vp
          vp_sha="$(git -C /tmp/vp rev-parse HEAD)"
          mkdir -p video
          rsync -a --exclude='.git/' /tmp/vp/ video/

          cat > video/MIGRATION.md <<EOF
          # VP migration

          This directory is the imported snapshot of \`tarematsu/VP\`.

          - Source commit: \`${vp_sha}\`
          - Imported into HP as: \`video/\`
          - Video Worker: \`videoscraper\`
          - HomePanel Worker: \`homepanel-cloud\`
          - Workers, D1 databases, queues, assets, bindings, cron schedules, and deployments remain separate.

          Original VP workflows are retained under \`video/.github/workflows\` as migration references. Active monorepo workflows belong under the HP root \`.github/workflows/\` directory.
          EOF

      - name: Commit imported workspace
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm -f .github/workflows/migrate-vp-into-video.yml || true
          git add video
          if git diff --cached --quiet; then
            echo 'No migration changes to commit.'
          else
            git commit -m 'Integrate VP as video workspace'
            git push origin HEAD:agent/integrate-vp-video
          fi

      - name: Report success
        if: success() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'VP migration completed and pushed to PR #204.'
            });

      - name: Report failure
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'VP migration failed. Inspect the workflow run logs for the failing step.'
            });
