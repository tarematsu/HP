name: Temporary Stationhead refresh fix

on:
  push:
    branches:
      - agent/fix-webview-auth-visibility

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-webview-auth-visibility
          fetch-depth: 0

      - name: Restore header and set 55-minute interval
        shell: python
        run: |
          from pathlib import Path

          original = Path('native/src/sh_shared_original.h')
          target = Path('native/src/sh_shared.h')
          workflow = Path('.github/workflows/temporary-fix-stationhead-refresh.yml')
          text = original.read_text(encoding='utf-8')
          old = "kStationheadSessionRefreshIntervalMs = 58 * 60'000"
          new = "kStationheadSessionRefreshIntervalMs = 55 * 60'000"
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one refresh constant, found {text.count(old)}')
          target.write_text(text.replace(old, new), encoding='utf-8', newline='')
          original.unlink()
          workflow.unlink()

      - name: Commit clean one-line change
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add native/src/sh_shared.h native/src/sh_shared_original.h .github/workflows/temporary-fix-stationhead-refresh.yml
          git commit -m "Refresh Stationhead sessions every 55 minutes"
          git push origin HEAD:agent/fix-webview-auth-visibility
