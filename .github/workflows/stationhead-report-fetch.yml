name: Fetch Stationhead SH report

on:
  push:
    branches:
      - automation/stationhead-report-fetch
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Download identifier report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 \
            https://automation-sh-refactor-scan-stationhead-monitor-collector.tarematsu.workers.dev/__sh_refactor_a9f6c3/report.json \
            -o out/stationhead-report.json
          python -m json.tool out/stationhead-report.json >/dev/null
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: stationhead-sh-report
          path: out/stationhead-report.json
          retention-days: 3
