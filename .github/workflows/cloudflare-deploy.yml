name: Cloud checks

on:
  push:
    branches: [main]
    paths: ["cloud/**", ".github/workflows/cloudflare-deploy.yml"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloud-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[codex-local-release]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Type check
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee ../cloud-check.log
      - name: Upload type-check log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-check-log
          path: cloud-check.log
          if-no-files-found: warn
          retention-days: 7
      - run: npm test
      - name: Validate local D1 migrations
        run: npm run migrate:local
