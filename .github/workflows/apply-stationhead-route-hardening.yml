name: Apply Stationhead route hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/isolate-stationhead-webview-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Harden startup, click, auth, and dashboard routes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              print(f'{label}: {count} match(es)')
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          shared_path = Path('native/src/sh_shared.h')
          shared = shared_path.read_text(encoding='utf-8')
          shared = replace_once(
              shared,
              "inline constexpr int64_t kStationheadSessionRefreshIntervalMs = 55 * 60'000;\n",
              "inline constexpr int64_t kStationheadSessionRefreshIntervalMs = 55 * 60'000;\n"
              "inline constexpr int64_t kStationheadStartupScriptRegistrationTimeoutMs = 5'000;\n"
              "inline constexpr int64_t kStationheadAuthControllerTimeoutMs = 20'000;\n"
              "inline constexpr int64_t kStationheadAutoClickRetryMs = 2'500;\n"
              "inline constexpr int64_t kStationheadAutoClickSuccessGraceMs = 5'000;\n"
              "inline constexpr int64_t kStationheadPostPlaybackStopClickDelayMs = 5'000;\n",
              'add route timing policies')
          shared_path.write_text(shared, encoding='utf-8')

          app_header_path = Path('native/src/app.h')
          app_header = app_header_path.read_text(encoding='utf-8')
          old_status = (
              '  StationheadStatus Status() const {\n'
              '    StationheadStatus status = player_ ? player_->Status() : StationheadStatus{};\n'
              '    const bool forceInteractive = status.loginRequired || status.spotifyAuthorization ||\n'
              '                                  status.processFailed;\n'
              '    if (player_ && SuppressTrackTransitionGap(status.audioPlaying, forceInteractive)) {\n'
              '      if (status.visible) player_->KeepPlaybackBehindDashboard();\n'
              '      status.audioPlaying = true;\n'
              '      status.playing = true;\n'
              '      status.visible = false;\n'
              '      status.detail = L"track transition; waiting for next audio";\n'
              '    }\n'
              '    status.audioMuted = audioMuted_;\n'
              '    return status;\n'
              '  }\n'
          )
          new_status = (
              '  StationheadStatus RawStatus() const {\n'
              '    StationheadStatus status = player_ ? player_->Status() : StationheadStatus{};\n'
              '    status.audioMuted = audioMuted_;\n'
              '    return status;\n'
              '  }\n'
              '\n'
              '  StationheadStatus Status() const {\n'
              '    StationheadStatus status = RawStatus();\n'
              '    const bool forceInteractive = status.loginRequired || status.spotifyAuthorization ||\n'
              '                                  status.processFailed;\n'
              '    if (player_ && SuppressTrackTransitionGap(status.audioPlaying, forceInteractive)) {\n'
              '      if (status.visible) player_->KeepPlaybackBehindDashboard();\n'
              '      status.audioPlaying = true;\n'
              '      status.playing = true;\n'
              '      status.visible = false;\n'
              '      status.detail = L"track transition; waiting for next audio";\n'
              '    }\n'
              '    return status;\n'
              '  }\n'
          )
          app_header = replace_once(app_header, old_status, new_status,
                                    'separate raw audio from transition grace')
          app_header_path.write_text(app_header, encoding='utf-8')

          app_path = Path('native/src/app.cpp')
          app = app_path.read_text(encoding='utf-8')
          old_deferred = (
              'void App::StartDeferredServices(int64_t now, const StationheadStatus& stationheadStatus) {\n'
              '  const bool primaryAudioReady = stationheadStatus.audioPlaying;\n'
              '  const bool secondaryEnabled = static_cast<bool>(secondaryStationhead_);\n'
              '  bool secondaryAudioReady = true;\n'
              '  if (!rendererStarted_ && secondaryEnabled) {\n'
              '    const StationheadStatus secondaryStatus = secondaryStationhead_->Status();\n'
              '    secondaryAudioReady = secondaryStatus.playing;\n'
              '  }\n'
          )
          new_deferred = (
              'void App::StartDeferredServices(int64_t now, const StationheadStatus&) {\n'
              '  const bool primaryAudioReady = stationhead_->RawStatus().audioPlaying;\n'
              '  const bool secondaryEnabled = static_cast<bool>(secondaryStationhead_);\n'
              '  bool secondaryAudioReady = true;\n'
              '  if (secondaryEnabled) {\n'
              '    const StationheadStatus secondaryStatus = secondaryStationhead_->RawStatus();\n'
              '    secondaryAudioReady = secondaryStatus.audioPlaying;\n'
              '  }\n'
          )
          app = replace_once(app, old_deferred, new_deferred,
                             'gate dashboard on actual audio')
          app_path.write_text(app, encoding='utf-8')

          messages_path = Path('native/src/app_messages.cpp')
          messages = messages_path.read_text(encoding='utf-8')
          messages = replace_once(
              messages,
              '      } else if (!layoutChanged && stateChanged) {\n'
              '        ApplyStationheadWindowPlacement(renderState_.stationhead, secondaryStatus);\n'
              '      }\n',
              '      } else if (!layoutChanged && stateChanged) {\n'
              '        if (selectedTab_ == WorkspaceTab::Main) {\n'
              '          ApplyStationheadWindowPlacement(renderState_.stationhead, secondaryStatus);\n'
              '        } else {\n'
              '          LayoutWorkspace();\n'
              '        }\n'
              '      }\n',
              'restore recreated WebViews in non-main workspaces')
          messages_path.write_text(messages, encoding='utf-8')

          header_path = Path('native/src/sh.h')
          header = header_path.read_text(encoding='utf-8')
          header = replace_once(
              header,
              '  void ApplyAudioPlaybackState(bool playing, const std::wstring& source);\n'
              '  void EnsureDistinctBrowserIdentity() noexcept;\n',
              '  void ApplyAudioPlaybackState(bool playing, const std::wstring& source);\n'
              '  void TryStartInitialNavigation();\n'
              '  void EnsureDistinctBrowserIdentity() noexcept;\n',
              'declare initial navigation gate')
          header = replace_once(
              header,
              '  int64_t createdAt_ = 0;\n'
              '  int64_t lastReloadAt_ = 0;\n',
              '  int64_t createdAt_ = 0;\n'
              '  int64_t startupScriptDeadline_ = 0;\n'
              '  int64_t authControllerStartedAt_ = 0;\n'
              '  int64_t lastReloadAt_ = 0;\n',
              'add startup and auth deadlines')
          header = replace_once(
              header,
              '  bool autoClickInFlight_ = false;\n'
              '  int64_t nextTickAt_ = 0;\n',
              '  bool autoClickInFlight_ = false;\n'
              '  bool webViewConfigured_ = false;\n'
              '  bool startupScriptRegistrationComplete_ = false;\n'
              '  bool startupNavigationStarted_ = false;\n'
              '  int64_t nextTickAt_ = 0;\n',
              'add initial navigation state')
          header_path.write_text(header, encoding='utf-8')

          sh_path = Path('native/src/sh.cpp')
          sh = sh_path.read_text(encoding='utf-8')
          sh = replace_once(
              sh,
              '  nextTickAt_ = 0;\n'
              '  nextAutoClickAt_ = 0;\n'
              '  if (changed) log_.Warn(L"Stationhead " + std::wstring(RoleTag()) + L" audio stopped (" + source + L")");\n',
              '  nextTickAt_ = 0;\n'
              '  if (changed) {\n'
              '    nextAutoClickAt_ = UnixMillis() + kStationheadPostPlaybackStopClickDelayMs;\n'
              '    log_.Warn(L"Stationhead " + std::wstring(RoleTag()) + L" audio stopped (" + source + L")");\n'
              '  }\n',
              'preserve click cooldown across false audio notifications')
          sh = replace_once(
              sh,
              'void StationheadPlayer::NavigateCurrentUrl(int64_t nowMs, const std::wstring& reason) {\n'
              '  NavigateStationheadUrl(nowMs, CurrentStationheadUrl(), reason, usingFallback_);\n'
              '}\n'
              '\n',
              'void StationheadPlayer::NavigateCurrentUrl(int64_t nowMs, const std::wstring& reason) {\n'
              '  NavigateStationheadUrl(nowMs, CurrentStationheadUrl(), reason, usingFallback_);\n'
              '}\n'
              '\n'
              'void StationheadPlayer::TryStartInitialNavigation() {\n'
              '  if (!webViewConfigured_ || !startupScriptRegistrationComplete_ ||\n'
              '      startupNavigationStarted_ || shuttingDown_ || !webview_) {\n'
              '    return;\n'
              '  }\n'
              '  startupNavigationStarted_ = true;\n'
              '  startupScriptDeadline_ = 0;\n'
              '  if (!pendingAuthorizationUrl_.empty()) {\n'
              '    const std::wstring authorizationUrl = pendingAuthorizationUrl_;\n'
              '    pendingAuthorizationUrl_.clear();\n'
              '    OpenSpotifyAuthorization(authorizationUrl);\n'
              '  } else {\n'
              '    NavigateCurrentUrl(UnixMillis(), L"startup");\n'
              '  }\n'
              '}\n'
              '\n',
              'add one-shot initial navigation')
          old_click = (
              'void StationheadPlayer::AttemptNativeStartClick(int64_t nowMs) {\n'
              '  if (!webview_ || autoClickInFlight_ || audioPlaying_.load(std::memory_order_relaxed)) return;\n'
              "  nextAutoClickAt_ = nowMs + 2'500;\n"
              '  autoClickInFlight_ = true;\n'
              '  const auto alive = createCallbackAlive_;\n'
              '  static const std::wstring locateScript = StationheadLocateStartButtonScript();\n'
              '  ComPtr<ICoreWebView2> view = webview_;\n'
              '  const HRESULT result = webview_->ExecuteScript(\n'
              '      locateScript.c_str(),\n'
              '      Callback<ICoreWebView2ExecuteScriptCompletedHandler>(\n'
              '          [this, alive, view](HRESULT scriptResult, LPCWSTR resultJson) -> HRESULT {\n'
              '            if (!CallbackAlive(alive)) return S_OK;\n'
              '            autoClickInFlight_ = false;\n'
              '            if (FAILED(scriptResult) || !resultJson) return S_OK;\n'
              '            double x = 0.0;\n'
              '            double y = 0.0;\n'
              '            if (!ParseStationheadLocateButtonResult(resultJson, x, y)) return S_OK;\n'
              '            log_.Info(L"Stationhead " + std::wstring(RoleTag()) +\n'
              '                      L" auto-clicking Start Listening at " + std::to_wstring(x) +\n'
              '                      L"," + std::to_wstring(y));\n'
              '            DispatchStationheadNativeClick(view.Get(), x, y, log_, RoleTag());\n'
              '            return S_OK;\n'
              '          }).Get());\n'
              '  if (FAILED(result)) autoClickInFlight_ = false;\n'
              '}\n'
          )
          new_click = (
              'void StationheadPlayer::AttemptNativeStartClick(int64_t nowMs) {\n'
              '  if (!webview_ || autoClickInFlight_ ||\n'
              '      audioPlaying_.load(std::memory_order_relaxed) || nowMs < nextAutoClickAt_) {\n'
              '    return;\n'
              '  }\n'
              '  nextAutoClickAt_ = nowMs + kStationheadAutoClickRetryMs;\n'
              '  autoClickInFlight_ = true;\n'
              '  const auto alive = createCallbackAlive_;\n'
              '  static const std::wstring locateScript = StationheadLocateStartButtonScript();\n'
              '  ComPtr<ICoreWebView2> view = webview_;\n'
              '  const HRESULT result = webview_->ExecuteScript(\n'
              '      locateScript.c_str(),\n'
              '      Callback<ICoreWebView2ExecuteScriptCompletedHandler>(\n'
              '          [this, alive, view](HRESULT scriptResult, LPCWSTR resultJson) -> HRESULT {\n'
              '            if (!CallbackAlive(alive)) return S_OK;\n'
              '            if (FAILED(scriptResult) || !resultJson) {\n'
              '              autoClickInFlight_ = false;\n'
              '              return S_OK;\n'
              '            }\n'
              '            double x = 0.0;\n'
              '            double y = 0.0;\n'
              '            if (!ParseStationheadLocateButtonResult(resultJson, x, y)) {\n'
              '              autoClickInFlight_ = false;\n'
              '              return S_OK;\n'
              '            }\n'
              '            nextAutoClickAt_ = std::max(\n'
              '                nextAutoClickAt_, UnixMillis() + kStationheadAutoClickSuccessGraceMs);\n'
              '            log_.Info(L"Stationhead " + std::wstring(RoleTag()) +\n'
              '                      L" auto-clicking Start Listening at " + std::to_wstring(x) +\n'
              '                      L"," + std::to_wstring(y));\n'
              '            DispatchStationheadNativeClick(view.Get(), x, y, log_, RoleTag());\n'
              '            autoClickInFlight_ = false;\n'
              '            return S_OK;\n'
              '          }).Get());\n'
              '  if (FAILED(result)) autoClickInFlight_ = false;\n'
              '}\n'
          )
          sh = replace_once(sh, old_click, new_click, 'debounce native Start Listening clicks')
          old_auth = (
              'void StationheadPlayer::EnsureAuthController(const std::wstring& url) {\n'
              '  authPendingUrl_ = url;\n'
              '  if (!environment_ || authController_ || !EnsureAuthHostWindow()) return;\n'
              '  authCallbackAlive_->store(false, std::memory_order_release);\n'
              '  authCallbackAlive_ = std::make_shared<std::atomic<bool>>(true);\n'
              '  const auto alive = authCallbackAlive_;\n'
              '  const auto onController = Callback<ICoreWebView2CreateCoreWebView2ControllerCompletedHandler>(\n'
              '      [this, alive](HRESULT result, ICoreWebView2Controller* controller) -> HRESULT {\n'
              '        if (!CallbackAlive(alive)) {\n'
              '          if (controller) controller->Close();\n'
              '          return S_OK;\n'
              '        }\n'
              '        if (FAILED(result) || !controller || shuttingDown_) {\n'
              '          if (controller) controller->Close();\n'
              '          return S_OK;\n'
              '        }\n'
              '        authController_ = controller;\n'
              '        authController_->put_IsVisible(FALSE);\n'
              '        authController_->get_CoreWebView2(&authWebview_);\n'
              '        ConfigureAuthWebView();\n'
              '        return S_OK;\n'
              '      });\n'
              '  environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());\n'
              '}\n'
          )
          new_auth = (
              'void StationheadPlayer::EnsureAuthController(const std::wstring& url) {\n'
              '  authPendingUrl_ = url;\n'
              '  if (!environment_ || authController_ || !EnsureAuthHostWindow()) return;\n'
              '  authCallbackAlive_->store(false, std::memory_order_release);\n'
              '  authCallbackAlive_ = std::make_shared<std::atomic<bool>>(true);\n'
              '  const auto alive = authCallbackAlive_;\n'
              '  authControllerStartedAt_ = UnixMillis();\n'
              '  const auto onController = Callback<ICoreWebView2CreateCoreWebView2ControllerCompletedHandler>(\n'
              '      [this, alive](HRESULT result, ICoreWebView2Controller* controller) -> HRESULT {\n'
              '        if (!CallbackAlive(alive)) {\n'
              '          if (controller) controller->Close();\n'
              '          return S_OK;\n'
              '        }\n'
              '        authControllerStartedAt_ = 0;\n'
              '        if (FAILED(result) || !controller || shuttingDown_) {\n'
              '          if (controller) controller->Close();\n'
              '          if (!shuttingDown_) {\n'
              '            FinishSpotifyAuthorization(\n'
              '                L"Spotify auth controller creation failed " + HResultHex(result));\n'
              '          }\n'
              '          return S_OK;\n'
              '        }\n'
              '        authController_ = controller;\n'
              '        authController_->put_IsVisible(FALSE);\n'
              '        authController_->get_CoreWebView2(&authWebview_);\n'
              '        if (!authWebview_) {\n'
              '          FinishSpotifyAuthorization(L"Spotify auth WebView unavailable");\n'
              '          return S_OK;\n'
              '        }\n'
              '        ConfigureAuthWebView();\n'
              '        return S_OK;\n'
              '      });\n'
              '  const HRESULT started =\n'
              '      environment_->CreateCoreWebView2Controller(authHostWindow_, onController.Get());\n'
              '  if (FAILED(started)) {\n'
              '    authControllerStartedAt_ = 0;\n'
              '    authCallbackAlive_->store(false, std::memory_order_release);\n'
              '    FinishSpotifyAuthorization(\n'
              '        L"Spotify auth controller could not start " + HResultHex(started));\n'
              '  }\n'
              '}\n'
          )
          sh = replace_once(sh, old_auth, new_auth, 'recover failed auth controller creation')
          sh = replace_once(
              sh,
              '  if (!spotifyAuthorization_ && authController_) CloseAuthWebView();\n'
              '  if (spotifyAuthorization_ || loginRequired_) {\n'
              '    nextTickAt_ = nowMs + 1\'000;\n'
              '    return;\n'
              '  }\n',
              '  if (!startupNavigationStarted_) {\n'
              '    if (!startupScriptRegistrationComplete_ && startupScriptDeadline_ > 0 &&\n'
              '        nowMs >= startupScriptDeadline_) {\n'
              '      startupScriptRegistrationComplete_ = true;\n'
              '      log_.Warn(L"Stationhead " + std::wstring(RoleTag()) +\n'
              '                L" startup script registration timed out; continuing without it");\n'
              '      TryStartInitialNavigation();\n'
              '    }\n'
              '    if (!startupNavigationStarted_) {\n'
              '      nextTickAt_ = nowMs + 1\'000;\n'
              '      return;\n'
              '    }\n'
              '  }\n'
              '  if (spotifyAuthorization_ && authControllerStartedAt_ > 0 &&\n'
              '      nowMs - authControllerStartedAt_ >= kStationheadAuthControllerTimeoutMs) {\n'
              '    authCallbackAlive_->store(false, std::memory_order_release);\n'
              '    authControllerStartedAt_ = 0;\n'
              '    FinishSpotifyAuthorization(L"Spotify auth controller creation timed out");\n'
              '    nextTickAt_ = nowMs + 1\'000;\n'
              '    return;\n'
              '  }\n'
              '  if (!spotifyAuthorization_ && authController_) CloseAuthWebView();\n'
              '  if (spotifyAuthorization_ || loginRequired_) {\n'
              '    nextTickAt_ = nowMs + 1\'000;\n'
              '    return;\n'
              '  }\n',
              'add startup-script and auth-controller watchdogs')
          sh_path.write_text(sh, encoding='utf-8')

          webview_path = Path('native/src/sh_webview.cpp')
          webview = webview_path.read_text(encoding='utf-8')
          webview = replace_once(
              webview,
              'void StationheadPlayer::ConfigureWebView() {\n'
              '  const auto alive = createCallbackAlive_;\n'
              '\n',
              'void StationheadPlayer::ConfigureWebView() {\n'
              '  const auto alive = createCallbackAlive_;\n'
              '  webViewConfigured_ = false;\n'
              '  startupScriptRegistrationComplete_ = false;\n'
              '  startupNavigationStarted_ = false;\n'
              '  startupScriptDeadline_ =\n'
              '      UnixMillis() + kStationheadStartupScriptRegistrationTimeoutMs;\n'
              '\n',
              'initialize WebView startup gate')
          old_scripts = (
              '  static const std::wstring authCaptureScript = StationheadAuthCaptureScript();\n'
              '  webview_->AddScriptToExecuteOnDocumentCreated(authCaptureScript.c_str(), nullptr);\n'
              '  static const std::wstring primaryStartupScript =\n'
              '      StationheadAutoplayScript(L"__homepanelPrimaryStationhead", L"stationhead");\n'
              '  static const std::wstring secondaryStartupScript =\n'
              '      StationheadAutoplayScript(L"__homepanelSecondaryStationhead", L"secondary");\n'
              '  const std::wstring& startupScript = IsSecondary() ? secondaryStartupScript : primaryStartupScript;\n'
              '  webview_->AddScriptToExecuteOnDocumentCreated(\n'
              '      startupScript.c_str(),\n'
              '      Callback<ICoreWebView2AddScriptToExecuteOnDocumentCreatedCompletedHandler>(\n'
              '          [this, alive](HRESULT result, LPCWSTR) -> HRESULT {\n'
              '            if (!CallbackAlive(alive)) return S_OK;\n'
              '            if (FAILED(result)) {\n'
              '              log_.Warn(L"Stationhead " + std::wstring(RoleTag()) + L" startup script registration failed " +\n'
              '                        HResultHex(result));\n'
              '            }\n'
              '            if (!pendingAuthorizationUrl_.empty()) {\n'
              '              const std::wstring authorizationUrl = pendingAuthorizationUrl_;\n'
              '              pendingAuthorizationUrl_.clear();\n'
              '              OpenSpotifyAuthorization(authorizationUrl);\n'
              '            } else {\n'
              '              NavigateCurrentUrl(UnixMillis(), L"startup");\n'
              '            }\n'
              '            return S_OK;\n'
              '          }).Get());\n'
          )
          new_scripts = (
              '  static const std::wstring authCaptureScript = StationheadAuthCaptureScript();\n'
              '  const HRESULT authCaptureResult =\n'
              '      webview_->AddScriptToExecuteOnDocumentCreated(authCaptureScript.c_str(), nullptr);\n'
              '  if (FAILED(authCaptureResult)) {\n'
              '    log_.Warn(L"Stationhead " + std::wstring(RoleTag()) +\n'
              '              L" auth capture script registration failed " + HResultHex(authCaptureResult));\n'
              '  }\n'
              '  static const std::wstring primaryStartupScript =\n'
              '      StationheadAutoplayScript(L"__homepanelPrimaryStationhead", L"stationhead");\n'
              '  static const std::wstring secondaryStartupScript =\n'
              '      StationheadAutoplayScript(L"__homepanelSecondaryStationhead", L"secondary");\n'
              '  const std::wstring& startupScript = IsSecondary() ? secondaryStartupScript : primaryStartupScript;\n'
              '  const HRESULT startupScriptResult = webview_->AddScriptToExecuteOnDocumentCreated(\n'
              '      startupScript.c_str(),\n'
              '      Callback<ICoreWebView2AddScriptToExecuteOnDocumentCreatedCompletedHandler>(\n'
              '          [this, alive](HRESULT result, LPCWSTR) -> HRESULT {\n'
              '            if (!CallbackAlive(alive)) return S_OK;\n'
              '            if (FAILED(result)) {\n'
              '              log_.Warn(L"Stationhead " + std::wstring(RoleTag()) +\n'
              '                        L" startup script registration failed " + HResultHex(result));\n'
              '            }\n'
              '            startupScriptRegistrationComplete_ = true;\n'
              '            TryStartInitialNavigation();\n'
              '            return S_OK;\n'
              '          }).Get());\n'
              '  if (FAILED(startupScriptResult)) {\n'
              '    log_.Warn(L"Stationhead " + std::wstring(RoleTag()) +\n'
              '              L" startup script registration could not start " +\n'
              '              HResultHex(startupScriptResult));\n'
              '    startupScriptRegistrationComplete_ = true;\n'
              '  }\n'
          )
          webview = replace_once(webview, old_scripts, new_scripts,
                                 'make startup script registration fail-open')
          webview = replace_once(
              webview,
              '            args->put_Handled(TRUE);\n'
              '            if (!environment_ || !EnsureAuthHostWindow()) return S_OK;\n'
              '            LPWSTR uriRaw = nullptr;\n',
              '            if (!environment_ || !EnsureAuthHostWindow()) {\n'
              '              args->put_Handled(FALSE);\n'
              '              log_.Warn(L"Stationhead " + std::wstring(RoleTag()) +\n'
              '                        L" could not prepare the Spotify popup host");\n'
              '              return S_OK;\n'
              '            }\n'
              '            LPWSTR uriRaw = nullptr;\n',
              'do not swallow popup when host creation fails')
          webview = replace_once(
              webview,
              '            ComPtr<ICoreWebView2Deferral> deferral;\n'
              '            if (FAILED(args->GetDeferral(&deferral)) || !deferral) return S_OK;\n'
              '            ComPtr<ICoreWebView2NewWindowRequestedEventArgs> popupArgs = args;\n',
              '            ComPtr<ICoreWebView2Deferral> deferral;\n'
              '            if (FAILED(args->GetDeferral(&deferral)) || !deferral) {\n'
              '              args->put_Handled(FALSE);\n'
              '              return S_OK;\n'
              '            }\n'
              '            args->put_Handled(TRUE);\n'
              '            ComPtr<ICoreWebView2NewWindowRequestedEventArgs> popupArgs = args;\n',
              'only handle popup after acquiring a deferral')
          webview = replace_once(
              webview,
              '            const auto authAlive = authCallbackAlive_;\n'
              '            spotifyAuthorization_ = true;\n',
              '            const auto authAlive = authCallbackAlive_;\n'
              '            authControllerStartedAt_ = UnixMillis();\n'
              '            spotifyAuthorization_ = true;\n',
              'start popup controller deadline')
          webview = replace_once(
              webview,
              '                  if (!CallbackAlive(authAlive)) {\n'
              '                    if (controller) controller->Close();\n'
              '                    deferral->Complete();\n'
              '                    return S_OK;\n'
              '                  }\n'
              '                  if (FAILED(result) || !controller || shuttingDown_) {\n',
              '                  if (!CallbackAlive(authAlive)) {\n'
              '                    if (controller) controller->Close();\n'
              '                    deferral->Complete();\n'
              '                    return S_OK;\n'
              '                  }\n'
              '                  authControllerStartedAt_ = 0;\n'
              '                  if (FAILED(result) || !controller || shuttingDown_) {\n',
              'clear popup controller deadline')
          webview = replace_once(
              webview,
              '            if (FAILED(createResult)) {\n'
              '              authCallbackAlive_->store(false, std::memory_order_release);\n',
              '            if (FAILED(createResult)) {\n'
              '              authControllerStartedAt_ = 0;\n'
              '              authCallbackAlive_->store(false, std::memory_order_release);\n',
              'clear synchronous popup failure deadline')
          webview = replace_once(
              webview,
              '  createdAt_ = lastReloadAt_ = UnixMillis();\n'
              '  resourceBlockingArmed_ = false;\n'
              '}\n',
              '  createdAt_ = lastReloadAt_ = UnixMillis();\n'
              '  resourceBlockingArmed_ = false;\n'
              '  webViewConfigured_ = true;\n'
              '  TryStartInitialNavigation();\n'
              '  PostChange();\n'
              '}\n',
              'start navigation only after all handlers are installed')
          webview = replace_once(
              webview,
              '  ApplyMute();\n'
              '  if (!authPendingUrl_.empty()) authWebview_->Navigate(authPendingUrl_.c_str());\n'
              '}\n',
              '  ApplyMute();\n'
              '  if (!authPendingUrl_.empty()) {\n'
              '    const HRESULT navigationResult = authWebview_->Navigate(authPendingUrl_.c_str());\n'
              '    if (FAILED(navigationResult)) {\n'
              '      FinishSpotifyAuthorization(\n'
              '          L"Spotify auth navigation could not start " + HResultHex(navigationResult));\n'
              '    }\n'
              '  }\n'
              '}\n',
              'recover synchronous auth navigation failure')
          webview = replace_once(
              webview,
              '  nativeAudioTracking_ = false;\n'
              '  resourceBlockingArmed_ = false;\n'
              '  identityWebview_ = nullptr;\n',
              '  nativeAudioTracking_ = false;\n'
              '  resourceBlockingArmed_ = false;\n'
              '  identityWebview_ = nullptr;\n'
              '  autoClickInFlight_ = false;\n'
              '  webViewConfigured_ = false;\n'
              '  startupScriptRegistrationComplete_ = false;\n'
              '  startupNavigationStarted_ = false;\n'
              '  startupScriptDeadline_ = 0;\n'
              '  ResetNavigationRouteState();\n',
              'clear stale playback and startup state on recreation')
          webview = replace_once(
              webview,
              '  if (hostWindow_ && IsWindow(hostWindow_)) ShowWindow(hostWindow_, SW_HIDE);\n'
              '  spotifyAuthorization_ = false;\n',
              '  if (hostWindow_ && IsWindow(hostWindow_)) ShowWindow(hostWindow_, SW_HIDE);\n'
              '  viewVisible_ = false;\n'
              '  selectedTab_ = StationheadTabKind::None;\n'
              '  spotifyAuthorization_ = false;\n',
              'hide unavailable player surface')
          webview = replace_once(
              webview,
              '  std::lock_guard lock(mutex_);\n'
              '  status_.created = false;\n'
              '}\n',
              '  std::lock_guard lock(mutex_);\n'
              '  status_.created = false;\n'
              '  status_.navigating = false;\n'
              '  status_.audioPlaying = false;\n'
              '  status_.playing = false;\n'
              '  status_.visible = false;\n'
              '}\n',
              'clear stale status after WebView close')
          webview = replace_once(
              webview,
              '  authCallbackAlive_->store(false, std::memory_order_release);\n'
              '  if (authWebview_) {\n',
              '  authCallbackAlive_->store(false, std::memory_order_release);\n'
              '  authControllerStartedAt_ = 0;\n'
              '  if (authWebview_) {\n',
              'clear auth creation deadline on close')
          webview_path.write_text(webview, encoding='utf-8')

          layout_path = Path('native/src/sh_layout.cpp')
          layout = layout_path.read_text(encoding='utf-8')
          layout = replace_once(
              layout,
              '  return selectedTab_ == StationheadTabKind::Auth ||\n'
              '         spotifyAuthorization_ ||\n'
              '         loginRequired_ ||\n'
              '         !audioPlaying_.load(std::memory_order_relaxed);\n',
              '  return selectedTab_ == StationheadTabKind::Auth ||\n'
              '         spotifyAuthorization_ ||\n'
              '         loginRequired_ ||\n'
              '         (controller_ && !audioPlaying_.load(std::memory_order_relaxed));\n',
              'avoid blank host overlays before controller creation')
          layout_path.write_text(layout, encoding='utf-8')

          combined = '\n'.join(path.read_text(encoding='utf-8') for path in [
              shared_path, app_header_path, app_path, messages_path, header_path,
              sh_path, webview_path, layout_path,
          ])
          required = [
              'RawStatus() const',
              'startup script registration timed out; continuing without it',
              'nowMs < nextAutoClickAt_',
              'TryStartInitialNavigation()',
              'Spotify auth controller creation timed out',
              '(controller_ && !audioPlaying_.load',
          ]
          for marker in required:
              if marker not in combined:
                  raise SystemExit(f'missing route-hardening marker: {marker}')
          PY

          rm .github/workflows/apply-stationhead-route-hardening.yml
          git diff --check

      - name: Commit route hardening
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/app.cpp native/src/app.h native/src/app_messages.cpp \
            native/src/sh.cpp native/src/sh.h native/src/sh_layout.cpp \
            native/src/sh_shared.h native/src/sh_webview.cpp \
            .github/workflows/apply-stationhead-route-hardening.yml
          git commit -m "Harden Stationhead startup and transition routes"
          git push origin HEAD:${{ github.head_ref }}
