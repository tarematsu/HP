name: Apply Stationhead WebView isolation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/isolate-stationhead-webview-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply focused isolation patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          app_path = Path('native/src/app.cpp')
          app = app_path.read_text(encoding='utf-8')
          app = replace_once(
              app,
              '''  const fs::path stationheadData = dataDir_ / L"webview2-stationhead";
          stationhead_ = std::make_unique<StationheadPlayer>(
              StationheadRole::Primary, window_, config_.stationhead, stationheadData, *logger_);
          if (config_.stationhead.secondaryEnabled && !config_.stationhead.secondaryUrl.empty()) {
            secondaryStationhead_ = std::make_unique<StationheadPlayer>(
                StationheadRole::Secondary, window_, config_.stationhead, stationheadData, *logger_);
            logger_->Info(L"Secondary Stationhead prepared to start alongside primary");
          }
          ''',
              '''  // Keep the primary on its existing folder so its login survives this
          // migration. Window B gets its own user-data folder and therefore its own
          // browser process, cache, service workers, cookies, and storage.
          const fs::path primaryStationheadData = dataDir_ / L"webview2-stationhead";
          const fs::path secondaryStationheadData = dataDir_ / L"webview2-stationhead-secondary";
          stationhead_ = std::make_unique<StationheadPlayer>(
              StationheadRole::Primary, window_, config_.stationhead, primaryStationheadData, *logger_);
          if (config_.stationhead.secondaryEnabled && !config_.stationhead.secondaryUrl.empty()) {
            secondaryStationhead_ = std::make_unique<StationheadPlayer>(
                StationheadRole::Secondary, window_, config_.stationhead, secondaryStationheadData, *logger_);
            logger_->Info(L"Secondary Stationhead prepared with isolated WebView2 user data");
          }
          ''',
              'separate Stationhead data folders',
          )
          if app.count('primaryStationheadData') != 2:
              raise SystemExit('primary Stationhead folder wiring is incomplete')
          if app.count('secondaryStationheadData') != 2:
              raise SystemExit('secondary Stationhead folder wiring is incomplete')
          if 'config_.stationhead, stationheadData' in app:
              raise SystemExit('shared Stationhead user-data wiring remains')
          app_path.write_text(app, encoding='utf-8')

          webview_path = Path('native/src/sh_webview.cpp')
          webview = webview_path.read_text(encoding='utf-8')
          webview = replace_once(
              webview,
              '''  ComPtr<ICoreWebView2_19> v19;
          if (config_.lowMemoryMode && SUCCEEDED(webview_.As(&v19))) {
            v19->put_MemoryUsageTargetLevel(COREWEBVIEW2_MEMORY_USAGE_TARGET_LEVEL_LOW);
          }
          ApplyMute();
          ''',
              '''  // An audio WebView must not be marked as a low-memory discard target.
          // Once the dashboard moves it behind the native surface, WebView2 can
          // otherwise unload and recreate the page, stopping playback and causing
          // Start Listening to be clicked again. Keep LOW only for the transient
          // authorization WebView below.
          ApplyMute();
          ''',
              'keep playback WebViews out of low-memory mode',
          )
          if webview.count('COREWEBVIEW2_MEMORY_USAGE_TARGET_LEVEL_LOW') != 1:
              raise SystemExit('LOW memory target must remain only on the auth WebView')
          webview_path.write_text(webview, encoding='utf-8')
          PY

          rm .github/workflows/apply-stationhead-webview-isolation.yml
          git diff --check

      - name: Commit source fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add native/src/app.cpp native/src/sh_webview.cpp \
            .github/workflows/apply-stationhead-webview-isolation.yml
          git commit -m "Isolate Stationhead WebView data and playback memory"
          git push origin HEAD:${{ github.head_ref }}
