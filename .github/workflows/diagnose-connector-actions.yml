name: Diagnose connector Actions trigger

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  acknowledge:
    if: github.event.issue.title == '[automation] Diagnose Actions trigger'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm workflow execution
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'GitHub Actions trigger confirmed.'
            });
