name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run CI checks
        shell: bash
        run: |
          set -e -o pipefail
          mkdir -p ci-diagnostics
          npm install --no-audit --no-fund 2>&1 | tee ci-diagnostics/install.log
          npm run check:syntax 2>&1 | tee ci-diagnostics/syntax.log
          npm run check:audit 2>&1 | tee ci-diagnostics/audit.log
          npm test 2>&1 | tee ci-diagnostics/tests.log
          npm run check:bundle 2>&1 | tee ci-diagnostics/bundle.log

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
          path: ci-diagnostics/
          if-no-files-found: warn
          retention-days: 14
