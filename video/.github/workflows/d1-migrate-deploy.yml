name: D1 migrate and deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/d1-migrate-deploy.yml'
      - 'migrations/**'
      - 'public/**'
      - 'scripts/push-manual-import-recovery.mjs'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.jsonc'

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run full validation
        run: npm run check

  migrate-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CLOUDFLARE_BUILDS_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      MANUAL_IMPORT_QUEUE: videoscraper-manual-imports
      MANUAL_IMPORT_DLQ: videoscraper-manual-imports-dlq
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Mark production deployment pending
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data '{"state":"pending","context":"cloudflare/production-deploy","description":"Production deployment is running"}'

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Cloudflare API token is not configured"; exit 1; }

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Resolve account and ensure queues exist
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
          npx --no-install wrangler whoami
          ensure_queue() {
            local name="$1"
            if npx --no-install wrangler queues info "$name" >/dev/null 2>&1; then
              echo "Queue already exists: $name"
            else
              npx --no-install wrangler queues create "$name"
            fi
            npx --no-install wrangler queues info "$name"
          }
          ensure_queue "$MANUAL_IMPORT_QUEUE"
          ensure_queue "$MANUAL_IMPORT_DLQ"

      - name: Apply pending D1 migrations
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
          npm run db:migrate:remote

      - name: Deploy merged main Worker
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
          short_sha="${GITHUB_SHA:0:12}"
          npx --no-install wrangler deploy \
            --strict \
            --tag "git-$short_sha" \
            --message "GitHub main $GITHUB_SHA"

      - name: Verify active production deployment
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
          npx --no-install wrangler deployments status --json | tee deployment-status.json
          test -s deployment-status.json
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('deployment-status.json','utf8')); if (!data || (Array.isArray(data) && data.length === 0)) process.exit(1);"

      - name: Seed pre-Queue D1 jobs after deployment
        run: node scripts/push-manual-import-recovery.mjs

      - name: Mark production deployment successful
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data '{"state":"success","context":"cloudflare/production-deploy","description":"Production Worker deployment verified"}'

      - name: Mark production deployment failed
        if: failure()
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            --data '{"state":"failure","context":"cloudflare/production-deploy","description":"Production Worker deployment failed"}'

      - name: Upload deployment verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-${{ github.sha }}
          path: deployment-status.json
          if-no-files-found: warn
          retention-days: 30
