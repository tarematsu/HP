name: Worker integration tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[ci full]'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run Worker integration suite
        run: npm test
